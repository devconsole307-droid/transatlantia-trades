<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/img/logo.svg"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>Live Chat — Admin</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .chat-layout { display: grid; grid-template-columns: 320px 1fr; height: calc(100vh - 64px); }

    /* Sessions sidebar */
    .sessions-panel { border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .sessions-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .sessions-header h3 { font-size: 15px; font-weight: 700; }
    .sessions-tabs { display: flex; padding: 8px; gap: 4px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .s-tab { flex: 1; padding: 7px; text-align: center; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; background: transparent; color: var(--text-secondary); transition: all .15s; }
    .s-tab.active { background: var(--primary-glow); color: var(--primary); }
    .sessions-list { flex: 1; overflow-y: auto; }
    .session-item { padding: 14px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .15s; position: relative; }
    .session-item:hover { background: var(--bg-card-hover); }
    .session-item.active { background: var(--primary-glow); border-right: 3px solid var(--primary); }
    .session-name { font-weight: 600; font-size: 13px; margin-bottom: 3px; display: flex; align-items: center; justify-content: space-between; }
    .session-preview { font-size: 12px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }
    .session-time { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
    .session-unread { background: var(--danger); color: #fff; font-size: 10px; font-weight: 800; padding: 2px 6px; border-radius: 100px; }
    .session-status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    .dot-open { background: var(--warning); }
    .dot-active { background: var(--success); }
    .dot-closed { background: var(--text-muted); }

    /* Chat panel */
    .chat-panel { display: flex; flex-direction: column; overflow: hidden; }
    .chat-panel-empty { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; color: var(--text-muted); gap: 12px; }
    .admin-chat-header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .admin-chat-info h4 { font-size: 14px; font-weight: 700; }
    .admin-chat-info p { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .admin-chat-actions { display: flex; gap: 8px; }

    .admin-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .admin-messages::-webkit-scrollbar { width: 4px; }
    .admin-messages::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }

    .a-msg { display: flex; flex-direction: column; max-width: 75%; animation: fadeIn .2s ease; }
    .a-msg.user { align-self: flex-start; }
    .a-msg.admin { align-self: flex-end; }
    .a-msg.system { align-self: center; max-width: 85%; }

    .a-bubble { padding: 10px 14px; border-radius: 16px; font-size: 13.5px; line-height: 1.5; word-break: break-word; }
    .a-msg.user .a-bubble { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-primary); border-bottom-left-radius: 4px; }
    .a-msg.admin .a-bubble { background: var(--primary); color: #fff; border-bottom-right-radius: 4px; }
    .a-msg.system .a-bubble { background: rgba(0,148,255,.06); color: var(--text-secondary); font-size: 12px; border: 1px solid rgba(0,148,255,.15); border-radius: 10px; text-align: center; }
    .a-meta { font-size: 10px; color: var(--text-muted); margin-top: 3px; padding: 0 4px; }
    .a-msg.admin .a-meta { text-align: right; }

    .typing-indicator-admin { display: flex; align-items: center; gap: 5px; align-self: flex-start; }
    .typing-dot-a { width: 6px; height: 6px; background: var(--text-muted); border-radius: 50%; animation: typingBounce 1.2s infinite; }
    .typing-dot-a:nth-child(2) { animation-delay: .2s; }
    .typing-dot-a:nth-child(3) { animation-delay: .4s; }
    @keyframes typingBounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

    .admin-input-bar { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; background: var(--bg-surface); }
    .admin-text-input { flex: 1; background: var(--bg-input); border: 1px solid var(--border); border-radius: 12px; color: var(--text-primary); font-family: var(--font-body); font-size: 14px; padding: 11px 14px; outline: none; resize: none; max-height: 100px; min-height: 42px; transition: border-color .2s; }
    .admin-text-input:focus { border-color: var(--primary); }
    .admin-text-input::placeholder { color: var(--text-muted); }
    .admin-send-btn { height: 42px; padding: 0 18px; background: var(--primary); border: none; border-radius: 10px; color: #fff; font-weight: 600; font-size: 14px; cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
    .admin-send-btn:hover { background: var(--primary-dark); }
    .admin-send-btn:disabled { opacity: .5; cursor: not-allowed; }

    @media(max-width:768px) { .chat-layout { grid-template-columns: 1fr; } .chat-panel { display: none; } .chat-panel.mobile-open { display: flex; } }
  </style>
  <style>
    /* Hide Google Translate feedback bar and banner */
    .goog-te-banner-frame,.goog-te-ftab-frame,#goog-gt-votingFrame,
    .goog-te-balloon-frame,.goog-tooltip-card,.goog-te-menu-frame { display:none!important; }
    body { top:0!important; }
    .goog-te-gadget { color:transparent!important; font-size:0!important; }
    .goog-te-gadget>span>a { display:none!important; }
    .goog-te-gadget img { display:none!important; }
  </style>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand" style="border-bottom:2px solid var(--danger)">
      <div class="brand-logo" style="background:linear-gradient(135deg,var(--danger),#cc0000)">🛡</div>
      <div><div class="brand-name">Admin Panel</div><div class="brand-sub">TransAtlantia Trades</div></div>
    </div>
    <nav class="sidebar-nav">
      <a href="/admin/dashboard.html" class="sidebar-link"><span class="nav-icon">📊</span> Dashboard</a>
      <a href="/admin/users.html" class="sidebar-link"><span class="nav-icon">👥</span> Users</a>
      <a href="/admin/deposits.html" class="sidebar-link"><span class="nav-icon">💰</span> Deposits</a>
      <a href="/admin/withdrawals.html" class="sidebar-link"><span class="nav-icon">📤</span> Withdrawals</a>
      <a href="/admin/transactions.html" class="sidebar-link"><span class="nav-icon">📋</span> Transactions</a>
      <a href="/admin/plans.html" class="sidebar-link"><span class="nav-icon">📊</span> Plans</a>
      <a href="/admin/chat.html" class="sidebar-link active"><span class="nav-icon">💬</span> Live Chat</a>
      <a href="/admin/settings.html" class="sidebar-link"><span class="nav-icon">⚙️</span> Settings</a>
      <a href="/admin/email-templates.html" class="sidebar-link"><span class="nav-icon">📧</span> Email Templates</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user"><div class="user-avatar" style="background:var(--danger)">A</div><div class="user-info"><div class="user-name">Admin</div><div class="user-role" style="color:var(--danger)">Administrator</div></div></div>
      <button onclick="Auth.logout()" class="btn btn-ghost btn-sm w-full mt-1" style="color:var(--danger)">⬅ Logout</button>
    </div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <button class="hamburger" id="hamburger">☰</button>
      <div class="topbar-title"><h1>Live Chat Support</h1><p id="chatStatusLine">Connecting...</p></div>
      <div class="topbar-actions">
        <button class="btn btn-outline btn-sm" onclick="loadSessions(currentFilter)">🔄 Refresh</button>
      </div>
    </header>

    <div class="chat-layout">
      <!-- SESSIONS LIST -->
      <div class="sessions-panel">
        <div class="sessions-header">
          <h3>Conversations</h3>
          <span id="sessionCount" style="font-size:12px;color:var(--text-muted)">—</span>
        </div>
        <div class="sessions-tabs">
          <button class="s-tab active" onclick="filterSessions('open',this)">Open</button>
          <button class="s-tab" onclick="filterSessions('active',this)">Active</button>
          <button class="s-tab" onclick="filterSessions('closed',this)">Closed</button>
          <button class="s-tab" onclick="filterSessions('all',this)">All</button>
        </div>
        <div class="sessions-list" id="sessionsList">
          <div style="padding:40px;text-align:center;color:var(--text-muted)">Loading sessions...</div>
        </div>
      </div>

      <!-- CHAT PANEL -->
      <div class="chat-panel" id="chatPanel">
        <div class="chat-panel-empty" id="emptyState">
          <div style="font-size:3rem">💬</div>
          <p>Select a conversation to respond</p>
        </div>
        <div id="activeChatArea" style="display:none;flex:1;display:none;flex-direction:column;overflow:hidden">
          <div class="admin-chat-header">
            <div class="admin-chat-info">
              <h4 id="activeName">—</h4>
              <p id="activeEmail">—</p>
            </div>
            <div class="admin-chat-actions">
              <button class="btn btn-success btn-sm" id="closeSessionBtn" onclick="closeSession()">✓ Close Chat</button>
            </div>
          </div>
          <div class="admin-messages" id="adminMessages"></div>
          <div id="adminTypingIndicator" style="display:none;padding:4px 20px 0">
            <div class="typing-indicator-admin">
              <span class="typing-dot-a"></span><span class="typing-dot-a"></span><span class="typing-dot-a"></span>
              <span style="font-size:11px;color:var(--text-muted);margin-left:4px">User is typing...</span>
            </div>
          </div>
          <div class="admin-input-bar">
            <textarea class="admin-text-input" id="adminInput" placeholder="Type your reply..."></textarea>
            <button class="admin-send-btn" id="adminSendBtn" onclick="sendAdminMessage()">Send ↗</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="/js/utils.js"></script>
<script>
  if (!Auth.requireAdmin()) throw new Error();
  UI.initSidebar();

  let socket = null;
  let activeSessionId = null;
  let currentFilter = 'open';
  let typingTimer = null;
  const TOKEN = Auth.getToken();

  // ---- CONNECT SOCKET ----
  function initAdminSocket() {
    const script = document.createElement('script');
    script.src = '/socket.io/socket.io.js';
    script.onload = () => {
      socket = io(window.location.origin, {
        auth: { token: TOKEN },
        transports: ['websocket', 'polling'],
      });

      socket.on('connect', () => {
        document.getElementById('chatStatusLine').textContent = 'Connected — monitoring all chats';
        // Admin is already in the 'admins' broadcast room (handled server-side on connect)
      });

      socket.on('new_message', (msg) => {
        if (msg.session_id === activeSessionId || !msg.session_id) {
          appendAdminMessage(msg);
          markRead(activeSessionId);
        } else {
          // Update unread badge on session list
          const item = document.querySelector(`[data-session="${msg.session_id}"]`);
          if (item) {
            let badge = item.querySelector('.session-unread');
            if (!badge) { badge = document.createElement('span'); badge.className='session-unread'; item.querySelector('.session-name').appendChild(badge); }
            const cur = parseInt(badge.textContent)||0;
            badge.textContent = cur + 1;
          }
          loadUnreadBadge();
        }
      });

      socket.on('session_update', ({ session_id, last_message, guest_name }) => {
        loadSessions(currentFilter);
        loadUnreadBadge();
      });

      socket.on('user_typing', ({ name, is_typing }) => {
        if (is_typing) {
          document.getElementById('adminTypingIndicator').style.display = 'block';
        } else {
          document.getElementById('adminTypingIndicator').style.display = 'none';
        }
      });

      socket.on('disconnect', () => {
        document.getElementById('chatStatusLine').textContent = 'Disconnected — trying to reconnect...';
      });
    };
    document.head.appendChild(script);
  }

  // ---- LOAD SESSIONS ----
  async function loadSessions(status = 'open') {
    currentFilter = status;
    document.getElementById('sessionsList').innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-muted)">Loading...</div>';
    try {
      const res = await api.get('/chat/admin/sessions?status=' + status);
      const sessions = res.sessions || [];
      document.getElementById('sessionCount').textContent = sessions.length + ' chats';

      if (!sessions.length) {
        document.getElementById('sessionsList').innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-muted)">No conversations found</div>';
        return;
      }

      document.getElementById('sessionsList').innerHTML = sessions.map(s => `
        <div class="session-item ${s.id === activeSessionId ? 'active' : ''}" data-session="${s.id}" onclick="openSession('${s.id}','${escHtml(s.guest_name||'Unknown')}','${escHtml(s.guest_email||'')}')">
          <div class="session-name">
            <span><span class="session-status-dot dot-${s.status}"></span>${escHtml(s.guest_name || 'Guest')}</span>
            ${parseInt(s.unread_count)>0 ? `<span class="session-unread">${s.unread_count}</span>` : ''}
          </div>
          <div class="session-preview">${escHtml(s.last_message || s.subject || 'No messages yet')}</div>
          <div class="session-time">${fmt.timeAgo(s.last_message_at)}</div>
        </div>
      `).join('');
    } catch(e) { Toast.error('Failed to load sessions'); }
  }

  // ---- OPEN SESSION ----
  async function openSession(id, name, email) {
    activeSessionId = id;
    document.querySelectorAll('.session-item').forEach(el => el.classList.toggle('active', el.dataset.session === id));
    document.getElementById('emptyState').style.display = 'none';
    const area = document.getElementById('activeChatArea');
    area.style.display = 'flex';
    document.getElementById('activeName').textContent = name;
    document.getElementById('activeEmail').textContent = email || 'Guest user';
    document.getElementById('adminMessages').innerHTML = '';

    try {
      const res = await api.get('/chat/admin/sessions/' + id);
      res.messages.forEach(appendAdminMessage);
      scrollAdminToBottom();
      socket?.emit('join_session', { session_id: id });

      // Update close button based on status
      if (res.session.status === 'closed') {
        document.getElementById('closeSessionBtn').style.display = 'none';
        document.querySelector('.admin-input-bar').style.opacity = '0.5';
        document.getElementById('adminInput').disabled = true;
        document.getElementById('adminSendBtn').disabled = true;
      } else {
        document.getElementById('closeSessionBtn').style.display = 'inline-flex';
        document.querySelector('.admin-input-bar').style.opacity = '1';
        document.getElementById('adminInput').disabled = false;
        document.getElementById('adminSendBtn').disabled = false;
      }
    } catch(e) { Toast.error('Failed to load chat'); }
  }

  // ---- APPEND MESSAGE ----
  function appendAdminMessage(msg) {
    const container = document.getElementById('adminMessages');
    if (!container) return;
    const div = document.createElement('div');
    div.className = `a-msg ${msg.sender_type}`;
    const time = new Date(msg.created_at).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
    const nameLabel = msg.sender_type === 'user'
      ? `<div class="a-meta">${escHtml(msg.sender_name||'User')} · ${time}</div>`
      : msg.sender_type === 'admin'
      ? `<div class="a-meta">${escHtml(msg.sender_name||'Agent')} · ${time}</div>`
      : '';
    div.innerHTML = `<div class="a-bubble">${escHtml(msg.message)}</div>${nameLabel}`;
    container.appendChild(div);
    scrollAdminToBottom();
  }

  // ---- SEND MESSAGE ----
  function sendAdminMessage() {
    const input = document.getElementById('adminInput');
    const message = input?.value?.trim();
    if (!message || !activeSessionId) return;

    if (socket) {
      socket.emit('send_message', { session_id: activeSessionId, message });
    }
    input.value = '';
    input.style.height = 'auto';
  }

  // ---- CLOSE SESSION ----
  async function closeSession() {
    if (!activeSessionId || !confirm('Close this chat session?')) return;
    socket?.emit('close_session', { session_id: activeSessionId });
    setTimeout(() => loadSessions(currentFilter), 500);
  }

  // ---- HELPERS ----
  async function markRead(sessionId) {
    const item = document.querySelector(`[data-session="${sessionId}"] .session-unread`);
    if (item) item.remove();
    loadUnreadBadge();
  }

  async function loadUnreadBadge() {
    try {
      const res = await api.get('/chat/admin/unread');
      const badge = document.getElementById('adminChatBadge');
      if (res.count > 0) { badge.style.display = 'flex'; badge.textContent = res.count; }
      else badge.style.display = 'none';
    } catch(e) {}
  }

  function filterSessions(status, btn) {
    document.querySelectorAll('.s-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadSessions(status);
  }

  function scrollAdminToBottom() {
    const c = document.getElementById('adminMessages');
    if (c) c.scrollTop = c.scrollHeight;
  }

  function escHtml(text) {
    return String(text||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ---- INIT ----
  const adminInput = document.getElementById('adminInput');
  if (adminInput) {
    adminInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendAdminMessage(); }
    });
    adminInput.addEventListener('input', () => {
      adminInput.style.height = 'auto';
      adminInput.style.height = Math.min(adminInput.scrollHeight, 100) + 'px';
      if (socket && activeSessionId) {
        socket.emit('typing', { session_id: activeSessionId, is_typing: true });
        clearTimeout(typingTimer);
        typingTimer = setTimeout(() => socket.emit('typing', { session_id: activeSessionId, is_typing: false }), 1500);
      }
    });
  }

  initAdminSocket();
  loadSessions('open');
  loadUnreadBadge();
  setInterval(() => loadUnreadBadge(), 15000);
</script>
</body>
</html>
