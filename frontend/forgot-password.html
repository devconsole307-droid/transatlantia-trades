<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/img/logo.svg"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>Forgot Password — TransAtlantia Trades</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 50%,rgba(0,148,255,.06),transparent);pointer-events:none}
    .auth-box{width:100%;max-width:420px;position:relative;z-index:1}
    .auth-logo{display:flex;align-items:center;justify-content:center;gap:10px;font-family:var(--font-display);font-size:1.3rem;font-weight:800;margin-bottom:28px;text-decoration:none;color:var(--text-primary)}
    .brand-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--primary),#004db3);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px}
    .auth-card{background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--radius-xl);padding:36px}
    .auth-icon{width:60px;height:60px;background:rgba(0,148,255,.1);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 20px}
    .auth-footer{text-align:center;margin-top:20px;font-size:.85rem;color:var(--text-muted)}
  </style>
</head>
<body>
<div class="auth-box">
  <a href="/" class="auth-logo"><img src="/img/logo.svg" style="width:28px;height:28px;border-radius:6px;vertical-align:middle;margin-right:8px"> TransAtlantia Trades</a>
  <div class="auth-card">
    <div class="auth-icon">🔑</div>
    <h2 style="font-family:var(--font-display);font-size:1.3rem;font-weight:800;text-align:center;margin-bottom:6px">Forgot Password?</h2>
    <p style="color:var(--text-secondary);font-size:.875rem;text-align:center;margin-bottom:24px">Enter your email and we'll send you a reset link.</p>

    <div id="alertBox"></div>
    <div id="successState" style="display:none;text-align:center;padding:20px 0">
      <div style="font-size:3rem;margin-bottom:14px">📧</div>
      <h3 style="font-family:var(--font-display);font-weight:700;margin-bottom:8px">Check your inbox</h3>
      <p style="color:var(--text-secondary);font-size:.875rem">If that email is registered, a reset link has been sent. Check your spam folder if you don't see it.</p>
      <a href="/login.html" class="btn btn-primary btn-block mt-3">Back to Login</a>
    </div>

    <form id="forgotForm">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" id="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">Send Reset Link</button>
    </form>
  </div>
  <div class="auth-footer"><a href="/login.html">← Back to Login</a></div>
</div>

<script src="/js/utils.js"></script>
<script src="/js/chat.js"></script>
<script>
  Auth.requireGuest();
  document.getElementById('forgotForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const alertBox = document.getElementById('alertBox');
    alertBox.innerHTML = '';
    UI.setLoading(btn, true, 'Sending...');
    try {
      const res = await api.post('/auth/forgot-password', { email: document.getElementById('email').value.trim() });
      // Always show success (security — don't reveal if email exists)
      document.getElementById('forgotForm').style.display = 'none';
      document.getElementById('successState').style.display = 'block';
    } catch(e) {
      UI.showAlert(alertBox, 'Connection error. Please try again.', 'error');
      UI.setLoading(btn, false);
    }
  });
</script>
</body>
</html>
