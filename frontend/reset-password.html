<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/img/logo.svg"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>Reset Password — TransAtlantia Trades</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 50%,rgba(0,148,255,.06),transparent);pointer-events:none}
    .auth-box{width:100%;max-width:420px;position:relative;z-index:1}
    .auth-logo{display:flex;align-items:center;justify-content:center;gap:10px;font-family:var(--font-display);font-size:1.3rem;font-weight:800;margin-bottom:28px;text-decoration:none;color:var(--text-primary)}
    .brand-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--primary),#004db3);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px}
    .auth-card{background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--radius-xl);padding:36px}
    .auth-footer{text-align:center;margin-top:20px;font-size:.85rem;color:var(--text-muted)}
    .strength-bar{height:4px;background:var(--bg-input);border-radius:100px;margin-top:8px;overflow:hidden}
    .strength-fill{height:100%;border-radius:100px;transition:all .3s;width:0}
  </style>
</head>
<body>
<div class="auth-box">
  <a href="/" class="auth-logo"><img src="/img/logo.svg" style="width:28px;height:28px;border-radius:6px;vertical-align:middle;margin-right:8px"> TransAtlantia Trades</a>
  <div class="auth-card">
    <div style="text-align:center;margin-bottom:24px">
      <div style="font-size:2.5rem;margin-bottom:12px">🔐</div>
      <h2 style="font-family:var(--font-display);font-size:1.3rem;font-weight:800;margin-bottom:6px">Set New Password</h2>
      <p style="color:var(--text-secondary);font-size:.875rem">Choose a strong password for your account.</p>
    </div>

    <div id="alertBox"></div>
    <div id="invalidToken" style="display:none;text-align:center;padding:20px 0">
      <div style="font-size:2.5rem;margin-bottom:12px">⚠️</div>
      <h3 style="font-family:var(--font-display);font-weight:700;margin-bottom:8px;color:var(--danger)">Invalid or Expired Link</h3>
      <p style="color:var(--text-secondary);font-size:.875rem;margin-bottom:20px">This reset link has expired or already been used. Please request a new one.</p>
      <a href="/forgot-password.html" class="btn btn-primary btn-block">Request New Link</a>
    </div>

    <form id="resetForm">
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input type="password" class="form-control" id="newPassword" placeholder="Min 8 characters" required minlength="8" oninput="checkStrength(this.value)">
        <div class="strength-bar"><div class="strength-fill" id="strengthBar"></div></div>
        <p class="form-hint" id="strengthHint" style="margin-top:6px"></p>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm New Password</label>
        <input type="password" class="form-control" id="confirmPassword" placeholder="Repeat your password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="resetBtn">Reset Password</button>
    </form>
  </div>
  <div class="auth-footer"><a href="/login.html">← Back to Login</a></div>
</div>

<script src="/js/utils.js"></script>
<script src="/js/chat.js"></script>
<script>
  Auth.requireGuest();
  const params = new URLSearchParams(location.search);
  const token = params.get('token');

  if (!token) {
    document.getElementById('resetForm').style.display = 'none';
    document.getElementById('invalidToken').style.display = 'block';
  }

  function checkStrength(pw) {
    const bar = document.getElementById('strengthBar');
    const hint = document.getElementById('strengthHint');
    let score = 0;
    if (pw.length >= 8) score++;
    if (pw.length >= 12) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    const levels = [
      { w: '20%', color: 'var(--danger)', label: 'Very weak' },
      { w: '40%', color: 'var(--danger)', label: 'Weak' },
      { w: '60%', color: 'var(--warning)', label: 'Fair' },
      { w: '80%', color: 'var(--primary)', label: 'Good' },
      { w: '100%', color: 'var(--success)', label: 'Strong ✓' },
    ];
    const lvl = levels[Math.min(score, 4)];
    bar.style.width = lvl.w;
    bar.style.background = lvl.color;
    hint.textContent = pw ? lvl.label : '';
    hint.style.color = lvl.color;
  }

  document.getElementById('resetForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('resetBtn');
    const alertBox = document.getElementById('alertBox');
    const newPass = document.getElementById('newPassword').value;
    const confirm = document.getElementById('confirmPassword').value;
    alertBox.innerHTML = '';

    if (newPass.length < 8) { UI.showAlert(alertBox, 'Password must be at least 8 characters', 'error'); return; }
    if (newPass !== confirm) { UI.showAlert(alertBox, 'Passwords do not match', 'error'); return; }

    UI.setLoading(btn, true, 'Resetting...');
    try {
      const res = await api.post('/auth/reset-password', { token, password: newPass });
      if (res.success) {
        UI.showAlert(alertBox, '✅ Password reset! Redirecting to login...', 'success');
        setTimeout(() => window.location.href = '/login.html?reset=true', 2000);
      } else {
        if (res.message?.toLowerCase().includes('invalid') || res.message?.toLowerCase().includes('expired')) {
          document.getElementById('resetForm').style.display = 'none';
          document.getElementById('invalidToken').style.display = 'block';
        } else {
          UI.showAlert(alertBox, res.message || 'Reset failed', 'error');
        }
        UI.setLoading(btn, false);
      }
    } catch(e) {
      UI.showAlert(alertBox, 'Connection error. Please try again.', 'error');
      UI.setLoading(btn, false);
    }
  });
</script>
</body>
</html>
