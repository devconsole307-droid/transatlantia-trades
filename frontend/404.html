<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/img/logo.svg"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>Page Not Found — TransAtlantia Trades</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px}
    .notfound{max-width:480px}
    .notfound-code{font-family:var(--font-display);font-size:8rem;font-weight:800;line-height:1;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .notfound h1{font-size:1.8rem;margin:8px 0 12px}
    .notfound p{color:var(--text-secondary);font-size:.95rem;line-height:1.7;margin-bottom:32px}
    .notfound-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  </style>
</head>
<body>
<div class="notfound">
  <div class="notfound-code">404</div>
  <h1>Page Not Found</h1>
  <p>The page you're looking for doesn't exist or has been moved. Check the URL or navigate back to safety.</p>
  <div class="notfound-actions">
    <a href="/" class="btn btn-primary">← Back to Home</a>
    <a href="/login.html" class="btn btn-outline">Login</a>
  </div>
</div>
<script src="/js/utils.js"></script>
<script>
  // If logged in, offer dashboard link
  const user = Auth.getUser();
  if (user) {
    const actions = document.querySelector('.notfound-actions');
    const dashBtn = document.createElement('a');
    dashBtn.href = user.is_admin ? '/admin/dashboard.html' : '/dashboard.html';
    dashBtn.className = 'btn btn-outline';
    dashBtn.textContent = '→ My Dashboard';
    actions.appendChild(dashBtn);
  }
</script>
</body>
</html>
